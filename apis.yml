        url: 
          https://documentation.solarwinds.com/en/success_center/sam/content/sam-api-poller-methods.htm
      - type: SDK
        url: https://github.com/solarwinds/OrionSDK
    contact:
      - type: Support
        url: https://support.solarwinds.com
  - name: SolarWinds AppOptics API
    description: >-
      REST API for application performance monitoring providing CRUD access to metrics,
      dashboards, alerts, and traces. Supports custom metrics submission and distributed
      tracing for cloud-native applications. Note: AppOptics reached End of Service
      Life
      on November 30, 2025.
    humanURL: 
      https://documentation.solarwinds.com/en/success_center/appoptics/content/kb/custom_metrics/api.htm
    baseURL: https://api.appoptics.com/v1
    tags:
      - APM
      - Metrics
      - Tracing
      - Monitoring
      - Deprecated
    properties:
      - type: Documentation
        url: 
          https://documentation.solarwinds.com/en/success_center/appoptics/content/kb/custom_metrics/api.htm
      - type: Deprecation Notice
        url: 
          https://documentation.solarwinds.com/en/success_center/appoptics/content/kb/custom_metrics/api.htm
    contact:
      - type: Support
        url: https://support.solarwinds.com
