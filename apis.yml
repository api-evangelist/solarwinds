          https://documentation.solarwinds.com/en/success_center/dpa/default.htm
    contact:
      - type: Support
        url: https://support.solarwinds.com
  - name: SolarWinds NPM REST API
    description: >-
      Network Performance Monitor REST API for network device monitoring.
    humanURL: https://www.solarwinds.com/network-performance-monitor
    baseURL: https://[npm-server]:17778/SolarWinds/InformationService/v3
    tags:
      - Network
      - Performance
      - Monitoring
      - SNMP
    properties:
      - type: Documentation
        url: 
          https://documentation.solarwinds.com/en/success_center/npm/content/core-npm-rest-api.htm
      - type: SDK
        url: https://github.com/solarwinds/OrionSDK
    contact:
      - type: Support
        url: https://support.solarwinds.com
  - name: SolarWinds Web Help Desk API
    description: >-
      REST API for creating, reading, updating, and deleting data in Web Help Desk
      including tickets, clients, assets, and locations.
    humanURL: https://www.solarwinds.com/web-help-desk
    baseURL: https://[whd-server]/helpdesk/WebObjects/Helpdesk.woa/ra
    tags:
      - Help Desk
      - Ticketing
      - IT Support
      - Asset Management
    properties:
      - type: Documentation
        url: 
          https://documentation.solarwinds.com/en/success_center/whd/content/helpdeskprogrammingrestapi.htm
      - type: API Guide
        url: 
          https://documentation.solarwinds.com/archive/pdf/whd/whdapiguide.pdf
    contact:
      - type: Support
        url: https://support.solarwinds.com
  - name: SolarWinds Pingdom API
    description: API for website uptime monitoring, performance monitoring, and 
      transaction checks enabling automated management of checks, contacts, and 
      reporting. Uses Bearer Token authentication for secure API access.
    humanURL: https://www.solarwinds.com/pingdom
    baseURL: https://api.pingdom.com/api/3.1
    tags:
      - Uptime Monitoring
      - Website Monitoring
      - Performance
      - Synthetic Monitoring
    properties:
      - type: Documentation
        url: 
          https://documentation.solarwinds.com/en/success_center/pingdom/content/topics/the-pingdom-api.htm
      - type: Reference
        url: https://docs.pingdom.com/api/
      - type: Authentication
        url: 
          https://documentation.solarwinds.com/en/success_center/pingdom/content/shared/sw-unified-login.htm
      - type: OpenAPI
        url: openapi/solarwinds-pingdom-openapi.yml
    contact:
      - type: Support
        url: https://support.solarwinds.com
  - name: SolarWinds Loggly API
    description: RESTful API for cloud-based log management including event 
      submission, event retrieval, search, and account management. Supports 
      sending events over HTTP/S and retrieving log data via paginating event 
      retrieval endpoints.
    humanURL: https://www.solarwinds.com/loggly
    baseURL: https://[subdomain].loggly.com/apiv2
    tags:
      - Log Management
      - Logging
      - Search
      - Cloud
    properties:
      - type: Documentation
        url: 
          https://documentation.solarwinds.com/en/success_center/loggly/content/admin/api-overview.htm
      - type: Reference
        url: 
          https://documentation.solarwinds.com/en/success_center/loggly/content/admin/api-retrieving-data.htm
      - type: Authentication
        url: 
          https://documentation.solarwinds.com/en/success_center/loggly/content/admin/token-based-api-authentication.htm
      - type: Getting Started
        url: 
          https://documentation.solarwinds.com/en/success_center/loggly/content/admin/api-sending-data.htm
      - type: OpenAPI
        url: openapi/solarwinds-loggly-openapi.yml
    contact:
      - type: Support
        url: https://support.solarwinds.com
  - name: SolarWinds Papertrail API
    description: HTTP API for cloud-based log management including searching 
      logs, managing systems, groups, saved searches, and user accounts. 
      Provides endpoints for log search, settings management, and system 
      configuration via token-based authentication.
    humanURL: https://www.solarwinds.com/papertrail
    baseURL: https://papertrailapp.com/api/v1
    tags:
      - Log Management
      - Logging
      - Cloud
      - Search
    properties:
      - type: Documentation
        url: https://www.papertrail.com/help/http-api/
      - type: Reference
        url: https://www.papertrail.com/help/settings-api/
      - type: Search
        url: 
          https://documentation.solarwinds.com/en/success_center/papertrail/content/kb/how-it-works/search-api.htm
      - type: OpenAPI
        url: openapi/solarwinds-papertrail-openapi.yml
    contact:
      - type: Support
        url: https://support.solarwinds.com
  - name: SolarWinds IPAM API
    description: >-
      API for IP address management providing CRUD operations for subnets, IP addresses,
      and DNS entries through the SolarWinds Information Service.
    humanURL: https://www.solarwinds.com/ip-address-manager
    baseURL: https://[orion-server]:17778/SolarWinds/InformationService/v3
    tags:
      - IP Address Management
      - IPAM
      - DNS
      - DHCP
      - Network
    properties:
      - type: Documentation
        url: 
          https://documentation.solarwinds.com/en/success_center/ipam/content/ipam_documentation.htm
      - type: SDK
        url: https://github.com/solarwinds/OrionSDK
    contact:
      - type: Support
        url: https://support.solarwinds.com
  - name: SolarWinds NCM API
    description: >-
      API for network configuration management providing automation of configuration
      backups, change management, and compliance through the SolarWinds Information
      Service.
    humanURL: https://www.solarwinds.com/network-configuration-manager
    baseURL: https://[orion-server]:17778/SolarWinds/InformationService/v3
    tags:
      - Network Configuration
      - Configuration Management
      - Compliance
      - Automation
    properties:
      - type: Documentation
        url: 
          https://documentation.solarwinds.com/en/success_center/ncm/content/ncm_documentation.htm
      - type: SDK
        url: https://github.com/solarwinds/OrionSDK
    contact:
      - type: Support
        url: https://support.solarwinds.com
  - name: SolarWinds SAM API
    description: >-
      Server and Application Monitor API for monitoring application health and performance
      using the API Poller feature and SolarWinds Information Service.
    humanURL: https://www.solarwinds.com/server-application-monitor
    baseURL: https://[orion-server]:17778/SolarWinds/InformationService/v3
    tags:
