name: SolarWinds
description: >-
  A collection of APIs provided by SolarWinds for IT infrastructure management, monitoring,
  and observability.
image: https://www.solarwinds.com/sites/all/themes/solarwinds_theme/logo.png
created: '2024'
modified: '2026-03-16'
specificationVersion: '0.18'
url: https://www.solarwinds.com/apis.json
apis:
  - name: SolarWinds Orion API
    description: RESTful API for managing and monitoring network devices, 
      servers, and applications through the Orion Platform. Provides access to 
      the SolarWinds Information Service (SWIS) using SWQL queries via REST 
      endpoints.
    image: 
      https://www.solarwinds.com/sites/default/files/orion-platform-icon.png
    humanURL: https://www.solarwinds.com/orion-platform
    baseURL: https://[orion-server]:17778/SolarWinds/InformationService/v3
    tags:
      - Network Monitoring
      - Infrastructure Management
      - SWIS
      - Orion
    properties:
      - type: Documentation
        url: 
          https://documentation.solarwinds.com/en/success_center/orionplatform/content/core-swis-api.htm
      - type: OpenAPI
        url: openapi/solarwinds-orion-openapi.yml
      - type: Authentication
        url: 
          https://documentation.solarwinds.com/en/success_center/orionplatform/content/core-swis-api-authentication.htm
      - type: SDK
        url: https://github.com/solarwinds/OrionSDK
      - type: Reference
        url: https://github.com/solarwinds/OrionSDK/wiki/REST
    contact:
      - type: Support
        url: https://support.solarwinds.com
  - name: SolarWinds Service Desk API
    description: API for IT service management, ticketing, and help desk 
      operations. Provides CRUD access to incidents, service requests, changes, 
      problems, releases, and asset management resources.
    humanURL: https://www.solarwinds.com/service-desk
    baseURL: https://[instance].samanage.com/api
    tags:
      - ITSM
      - Service Desk
      - Ticketing
      - Help Desk
    properties:
      - type: Documentation
        url: 
          https://documentation.solarwinds.com/en/success_center/swsd/content/swsd_documentation.htm
      - type: Reference
        url: https://apidoc.samanage.com/
      - type: Authentication
        url: https://help.samanage.com/s/article/API-Authentication
      - type: Getting Started
        url: 
          https://documentation.solarwinds.com/en/success_center/swsd/content/swsd_getting_started_guide.htm
      - type: OpenAPI
        url: openapi/solarwinds-service-desk-openapi.yml
    contact:
      - type: Support
        url: https://support.solarwinds.com
  - name: SolarWinds Observability API
    description: >-
      Cloud-native observability API for logs, metrics, and distributed tracing.
    humanURL: https://www.solarwinds.com/solarwinds-observability
    baseURL: https://api.na-01.cloud.solarwinds.com
    tags:
      - Observability
      - APM
      - Monitoring
      - Cloud
      - Logs
      - Metrics
      - Tracing
    properties:
      - type: Documentation
        url: 
          https://documentation.solarwinds.com/en/success_center/observability/default.htm#cshid=api-overview
      - type: OpenAPI
        url: https://api.na-01.cloud.solarwinds.com/v1/openapi.json
      - type: API Reference
        url: 
          https://documentation.solarwinds.com/en/success_center/observability/content/api/api-swagger.htm
      - type: Authentication
        url: 
          https://documentation.solarwinds.com/en/success_center/observability/content/system/api-tokens.htm
      - type: SDKs
        url: https://github.com/solarwinds
    contact:
      - type: Support
        url: https://support.solarwinds.com
  - name: SolarWinds Database Performance Analyzer API
    description: >-
      API for database monitoring and performance analysis.
    humanURL: https://www.solarwinds.com/database-performance-analyzer
    baseURL: https://[dpa-server]:8124/iwc/api
    tags:
      - Database
      - Performance
      - Monitoring
      - SQL
    properties:
