naftiko: "1.0.0-alpha1"

info:
  label: "SolarWinds Infrastructure Monitoring"
  description: "Workflow for monitoring network infrastructure and website uptime combining Orion Platform SWQL queries with Pingdom synthetic monitoring for network and IT operations teams."
  tags:
    - SolarWinds
    - Infrastructure Monitoring
    - Network Monitoring
    - Uptime Monitoring
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      ORION_USERNAME: ORION_USERNAME
      ORION_PASSWORD: ORION_PASSWORD
      PINGDOM_API_TOKEN: PINGDOM_API_TOKEN

capability:
  consumes:
    - import: orion
      location: ./shared/orion.yaml
    - import: pingdom
      location: ./shared/pingdom.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: infra-monitoring-api
      description: "Unified REST API for SolarWinds infrastructure monitoring."
      resources:
        - path: /v1/query
          name: query
          description: "SWQL query execution"
          operations:
            - method: GET
              name: query-swis
              description: "Execute a SWQL query"
              call: "orion.query-swis"
              with:
                query: "rest.query"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/checks
          name: checks
          description: "Uptime monitoring checks"
          operations:
            - method: GET
              name: list-checks
              description: "List Pingdom checks"
              call: "pingdom.list-checks"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: get-check
              description: "Get check details"
              call: "pingdom.get-check"
              with:
                checkId: "rest.checkId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/results
          name: results
          description: "Check results"
          operations:
            - method: GET
              name: get-results
              description: "Get check results"
              call: "pingdom.get-results"
              with:
                checkId: "rest.checkId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: infra-monitoring-mcp
      transport: http
      description: "MCP server for AI-assisted infrastructure monitoring."
      tools:
        - name: query-orion
          description: "Execute a SWQL query against Orion Platform"
          hints:
            readOnly: true
          call: "orion.query-swis"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-orion-entity
          description: "Create a monitored entity in Orion"
          hints:
            readOnly: false
          call: "orion.create-entity"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-checks
          description: "List Pingdom uptime monitoring checks"
          hints:
            readOnly: true
          call: "pingdom.list-checks"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-check
          description: "Get Pingdom check details"
          hints:
            readOnly: true
          call: "pingdom.get-check"
          with:
            checkId: "tools.checkId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-check
          description: "Create a new Pingdom monitoring check"
          hints:
            readOnly: false
          call: "pingdom.create-check"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-check-results
          description: "Get Pingdom check results"
          hints:
            readOnly: true
          call: "pingdom.get-results"
          with:
            checkId: "tools.checkId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-summary-average
          description: "Get Pingdom performance summary"
          hints:
            readOnly: true
          call: "pingdom.get-summary-average"
          with:
            checkId: "tools.checkId"
          outputParameters:
            - type: object
              mapping: "$."
